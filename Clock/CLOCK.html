<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Clock/style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="main-container" id="mainContainer">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="header">
            <div class="logo">Chronos // System</div>
            <button class="theme-btn" id="themeBtn" onclick="cycleTheme()">Cycle Theme</button>
        </div>

        <div class="clock-wrapper">
            <div class="ring-glow"></div>
            <div class="ring-outer"></div>
            <div class="analog-clock" id="analog">
                <div class="center-dot"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="hand second-hand" id="secondHand"></div>
            </div>
        </div>

        <div class="decorative-line"></div>

        <div class="digital-clock" id="digital">
            <span id="dHour">00</span><span class="colon">:</span><span id="dMinute">00</span><span class="colon">:</span><span id="dSecond">00</span>
        </div>
        <div class="date" id="date">Loading...</div>

        <div class="stats-row">
            <div class="stat">
                <div class="stat-label">Day</div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="dayBar"></div></div>
                <div class="stat-value" id="dayPct">0%</div>
            </div>
            <div class="stat">
                <div class="stat-label">Month</div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="monthBar"></div></div>
                <div class="stat-value" id="monthPct">0%</div>
            </div>
            <div class="stat">
                <div class="stat-label">Year</div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="yearBar"></div></div>
                <div class="stat-value" id="yearPct">0%</div>
            </div>
        </div>
    </div>

    <script src="/Clock/script.js"></script>
</body>
</html>
