<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad's Chatbot</title>
    <link rel="stylesheet" href="/ChatBot/style.css">
</head>
<body>
    <div class="title">Ahmad's Chatbot</div>
    <div class="chat-wrapper">
        <div class="chat-box" id="box-ahmad">
            <div class="chat-header">&#x1F464; Ahmad</div>
            <div class="chat-area" id="area-ahmad"></div>
            <div class="chat-input-area">
                <input type="text" id="input-ahmad" placeholder="Type a message" title="Ahmad message input" onkeydown="if(event.key==='Enter')sendAhmad()">
                <button onclick="sendAhmad()" title="Send message">Send</button>
            </div>
        </div>
        <div class="chat-box" id="box-ali">
            <div class="chat-header">&#x1F464; Ali</div>
            <div class="chat-area" id="area-ali"></div>
            <div class="chat-input-area">
                <input type="text" id="input-ali" placeholder="Type a message" title="Ali message input" onkeydown="if(event.key==='Enter')sendAli()">
                <button onclick="sendAli()" title="Send message">Send</button>
            </div>
        </div>
    </div>
    <script src="/ChatBot/script.js"></script>
</body>
</html>
