<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Futuristic Tic-Tac-Toe with unbeatable AI, 3D particle background, and cyberpunk neon design."
    />
    <title>Neon Tactics — Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <main class="game-container" role="main">
      <h1>Neon Tactics</h1>
      <p class="subtitle">Strategic Combat Simulation</p>

      <div class="mode-toggle">
        <span>2 Players</span>
        <label class="switch">
          <input
            type="checkbox"
            id="modeToggle"
            checked
            aria-label="Toggle AI opponent"
          />
          <span class="slider"></span>
        </label>
        <span>vs AI</span>
      </div>

      <div class="score-board" role="region" aria-label="Score board">
        <div class="score">
          <span>Player X</span>
          <div id="scoreX">0</div>
        </div>
        <div class="score">
          <span>Draws</span>
          <div id="scoreDraw">0</div>
        </div>
        <div class="score">
          <span>Player O</span>
          <div id="scoreO">0</div>
        </div>
      </div>

      <div class="status" id="status" role="status" aria-live="polite">
        Player X's Turn
      </div>

      <div class="board" id="board" aria-label="Tic Tac Toe board">
        <div
          class="cell"
          data-index="0"
          role="button"
          tabindex="0"
          aria-label="Cell 1, empty"
        ></div>
        <div
          class="cell"
          data-index="1"
          role="button"
          tabindex="0"
          aria-label="Cell 2, empty"
        ></div>
        <div
          class="cell"
          data-index="2"
          role="button"
          tabindex="0"
          aria-label="Cell 3, empty"
        ></div>
        <div
          class="cell"
          data-index="3"
          role="button"
          tabindex="0"
          aria-label="Cell 4, empty"
        ></div>
        <div
          class="cell"
          data-index="4"
          role="button"
          tabindex="0"
          aria-label="Cell 5, empty"
        ></div>
        <div
          class="cell"
          data-index="5"
          role="button"
          tabindex="0"
          aria-label="Cell 6, empty"
        ></div>
        <div
          class="cell"
          data-index="6"
          role="button"
          tabindex="0"
          aria-label="Cell 7, empty"
        ></div>
        <div
          class="cell"
          data-index="7"
          role="button"
          tabindex="0"
          aria-label="Cell 8, empty"
        ></div>
        <div
          class="cell"
          data-index="8"
          role="button"
          tabindex="0"
          aria-label="Cell 9, empty"
        ></div>
      </div>

      <div class="controls">
        <button id="resetGame" type="button" aria-label="Start new game">
          New Game
        </button>
        <button id="resetScores" type="button" aria-label="Reset all scores">
          Reset Scores
        </button>
      </div>
    </main>

    <script src="./Script.js"></script>
  </body>
</html>
