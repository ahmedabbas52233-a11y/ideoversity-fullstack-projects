<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonCalc Pro</title>
    <link rel="stylesheet" href="/Calculator/style.css">
<base target="_blank">
</head>
<body>

<div class="calc-wrapper">
    <!-- Side History Panel -->
    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3>History</h3>
            <button class="clear-history" onclick="clearHistory()" title="Clear all history">Clear</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-history">No calculations yet</div>
        </div>
    </div>

    <!-- Main Calculator -->
    <div class="calculator" id="calculator">
        <!-- Mode Toggle -->
        <div class="mode-bar">
            <button class="mode-btn active" onclick="setMode('standard')" data-mode="standard">Standard</button>
            <button class="mode-btn" onclick="setMode('scientific')" data-mode="scientific">Scientific</button>
            <button class="mode-btn" onclick="setMode('programmer')" data-mode="programmer">Programmer</button>
        </div>

        <!-- Display -->
        <div class="display-container">
            <div class="memory-indicator" id="memIndicator">M</div>
            <div class="previous-operand" id="previous"></div>
            <div class="current-operand" id="current">0</div>
            <div class="operator-indicator" id="opIndicator"></div>
        </div>

        <!-- Scientific Keys (hidden by default) -->
        <div class="sci-keys" id="sciKeys">
            <button class="func sci" onclick="sciFunc('sin')" title="Sine">sin</button>
            <button class="func sci" onclick="sciFunc('cos')" title="Cosine">cos</button>
            <button class="func sci" onclick="sciFunc('tan')" title="Tangent">tan</button>
            <button class="func sci" onclick="sciFunc('asin')" title="Arcsine">sin⁻¹</button>
            <button class="func sci" onclick="sciFunc('acos')" title="Arccosine">cos⁻¹</button>
            <button class="func sci" onclick="sciFunc('atan')" title="Arctangent">tan⁻¹</button>
            <button class="func sci" onclick="sciFunc('log')" title="Logarithm">log</button>
            <button class="func sci" onclick="sciFunc('ln')" title="Natural Log">ln</button>
            <button class="func sci" onclick="sciFunc('sqrt')" title="Square Root">√</button>
            <button class="func sci" onclick="sciFunc('cbrt')" title="Cube Root">∛</button>
            <button class="func sci" onclick="sciFunc('pow')" title="Power">xʸ</button>
            <button class="func sci" onclick="sciFunc('fact')" title="Factorial">n!</button>
            <button class="func sci" onclick="sciFunc('pi')" title="Pi">π</button>
            <button class="func sci" onclick="sciFunc('e')" title="Euler's Number">e</button>
            <button class="func sci" onclick="sciFunc('abs')" title="Absolute Value">|x|</button>
            <button class="func sci" onclick="sciFunc('inv')" title="Reciprocal">¹⁄ₓ</button>
        </div>

        <!-- Programmer Keys (hidden by default) -->
        <div class="prog-keys" id="progKeys">
            <button class="func prog" onclick="progFunc('bin')" title="Binary">BIN</button>
            <button class="func prog" onclick="progFunc('oct')" title="Octal">OCT</button>
            <button class="func prog" onclick="progFunc('hex')" title="Hexadecimal">HEX</button>
            <button class="func prog" onclick="progFunc('dec')" title="Decimal">DEC</button>
            <button class="func prog" onclick="progFunc('and')" title="Bitwise AND">AND</button>
            <button class="func prog" onclick="progFunc('or')" title="Bitwise OR">OR</button>
            <button class="func prog" onclick="progFunc('xor')" title="Bitwise XOR">XOR</button>
            <button class="func prog" onclick="progFunc('not')" title="Bitwise NOT">NOT</button>
            <button class="func prog" onclick="progFunc('shl')" title="Shift Left">&lt;&lt;</button>
            <button class="func prog" onclick="progFunc('shr')" title="Shift Right">&gt;&gt;</button>
            <button class="func prog" onclick="progFunc('mod')" title="Modulo">mod</button>
        </div>

        <!-- Main Keypad -->
        <div class="keypad" id="keypad">
            <button class="func" onclick="memory('MC')" title="Memory Clear">MC</button>
            <button class="func" onclick="memory('MR')" title="Memory Recall">MR</button>
            <button class="func" onclick="memory('M+')" title="Memory Add">M+</button>
            <button class="func" onclick="memory('M-')" title="Memory Subtract">M−</button>

            <button class="func" onclick="clearAll()" title="All Clear">AC</button>
            <button class="func" onclick="deleteLast()" title="Delete last">DEL</button>
            <button class="func" onclick="toggleSign()" title="Toggle sign">±</button>
            <button class="operator" onclick="chooseOperation('÷')" title="Divide">÷</button>

            <button class="num" onclick="appendNumber('7')">7</button>
            <button class="num" onclick="appendNumber('8')">8</button>
            <button class="num" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="chooseOperation('×')" title="Multiply">×</button>

            <button class="num" onclick="appendNumber('4')">4</button>
            <button class="num" onclick="appendNumber('5')">5</button>
            <button class="num" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="chooseOperation('-')" title="Subtract">−</button>

            <button class="num" onclick="appendNumber('1')">1</button>
            <button class="num" onclick="appendNumber('2')">2</button>
            <button class="num" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="chooseOperation('+')" title="Add">+</button>

            <button class="num zero" onclick="appendNumber('0')">0</button>
            <button class="num" onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()" title="Calculate">=</button>
        </div>

        <!-- Theme & Sound Controls -->
        <div class="control-bar">
            <button class="theme-btn" onclick="cycleTheme()" title="Change theme">◐ Theme</button>
            <button class="sound-btn" onclick="toggleSound()" id="soundBtn" title="Toggle sound">🔊 Sound</button>
            <button class="history-toggle" onclick="toggleHistory()" title="Toggle history">📋 History</button>
            <button class="angle-btn" onclick="toggleAngle()" id="angleBtn" title="Toggle degrees/radians">DEG</button>
        </div>
    </div>
</div>

<script src="/Calculator/script.js"></script>
</body>
</html>
